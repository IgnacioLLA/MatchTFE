# --------------------------------------------------------------
#  SonarCloud project configuration for MATCH-TFE
#
#  How to find these values:
#    sonar.organization  -> sonarcloud.io/organizations/<YOUR_ORG_KEY>  (URL slug)
#    sonar.projectKey    -> sonarcloud.io -> your project -> Project Settings -> Project Key
#
#  The SONAR_TOKEN secret must be set in:
#    GitHub repo -> Settings -> Secrets and variables -> Actions -> New repository secret
#    Name: SONAR_TOKEN
#    Value: the token generated in SonarCloud -> My Account -> Security -> Generate Token
# --------------------------------------------------------------

sonar.organization=REPLACE_WITH_YOUR_ORG_KEY
sonar.projectKey=REPLACE_WITH_YOUR_PROJECT_KEY
sonar.projectName=MATCH-TFE

# Source directories (all service projects)
sonar.sources=AuthService,MatchService,NotificationService,UserService,TFELibrary,MatchTFE/MatchTFE,MatchTFE/MatchTFE.Client

# Test directories
sonar.tests=test/MatchTFE.UnitTest,test/MatchTFE.Client.Tests

# Exclusions
sonar.exclusions=**/Migrations/**,**/bin/**,**/obj/**,**/*.Designer.cs

# Coverage report path - SonarCloud requires OpenCover format for .NET (Cobertura is NOT supported)
# The CI generates both formats via: Format=opencover,cobertura
# Only the opencover output is sent to Sonar; cobertura is used by ReportGenerator for the HTML report.
sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml

# Do not fail the analysis if no coverage report is found (useful during early setup)
sonar.coverage.exclusions=**/Migrations/**,**/*.razor.g.cs

# Encoding
sonar.sourceEncoding=UTF-8
