# --------------------------------------------------------------
#  MATCH-TFE  -  CI Pipeline
#  Build -> Test -> Coverage -> SonarCloud Analysis
#
#  Required repository secrets (Settings > Secrets and variables > Actions):
#    secrets.SONAR_TOKEN     - Token generated in SonarCloud -> My Account -> Security -> Generate Token
#    secrets.GIST_TOKEN      - GitHub PAT with 'gist' scope (only needed for coverage badge)
#
#  Required repository variables (Settings > Secrets and variables > Actions > Variables):
#    vars.COVERAGE_GIST_ID   - ID of a public Gist where the badge JSON is stored
#                              (only needed for coverage badge)
# --------------------------------------------------------------
name: CI - Build, Test & Coverage

on:
  push:
    branches: [ main, master, dev, sonarqube ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # --------------------------------------------
  #  1. Build & Static Analysis (fast gate)
  # --------------------------------------------
  build:
    name: Build & Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore MATCH-TFE.slnx

      - name: Build solution
        run: dotnet build MATCH-TFE.slnx --no-restore --configuration Release

      - name: Static analysis (dotnet format)
        run: dotnet format MATCH-TFE.slnx --verify-no-changes --verbosity diagnostic
        continue-on-error: true

  # --------------------------------------------
  #  2. Tests + Coverage + SonarCloud Analysis
  #
  #  Per official SonarCloud docs, the .NET scanner
  #  MUST wrap build and test in the same job:
  #    sonar begin -> dotnet build -> dotnet test -> sonar end
  #
  #  SonarCloud does NOT support Cobertura for .NET.
  #  Use OpenCover format for Sonar and generate
  #  Cobertura separately for the HTML coverage report.
  # --------------------------------------------
  sonar-and-test:
    name: Tests, Coverage & SonarCloud
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Shallow clones must be disabled for SonarCloud
          # to correctly track new code and blame information
          fetch-depth: 0

      - name: Setup Java 17 (required by SonarScanner)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore MATCH-TFE.slnx

      - name: Install dotnet-sonarscanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: SonarCloud - Begin analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"IgnacioLLA_MatchTFE" \
            /o:"ignaciolla" \
            /n:"MATCH-TFE" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" \
            /d:sonar.coverage.exclusions="**/Migrations/**,**/*.razor.g.cs" \
            /d:sonar.exclusions="**/Migrations/**,**/bin/**,**/obj/**,**/*.Designer.cs"

      - name: Build solution (instrumented for Sonar)
        run: dotnet build MATCH-TFE.slnx --no-restore --configuration Release

      - name: Run tests with coverage
        run: |
          dotnet test MATCH-TFE.slnx \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover,cobertura \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByFile="**/Migrations/**"

      - name: SonarCloud - End analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: '**/TestResults/**/coverage.cobertura.xml'
          targetdir: ./CoverageReport
          reporttypes: 'HtmlInline_AzurePipelines;Cobertura;MarkdownSummaryGithub'
          assemblyfilters: '-*.Tests;-*.UnitTest'

      - name: Publish coverage summary
        if: always()
        run: |
          if [ -f ./CoverageReport/SummaryGithub.md ]; then
            echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat ./CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/**/*.trx
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./CoverageReport
          retention-days: 30

      - name: Publish coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage-badge.json
          label: Coverage
          message: ${{ steps.coverage.outputs.coverage }}
          valColorRange: ${{ steps.coverage.outputs.coverage }}
          minColorRange: 0
          maxColorRange: 100
        continue-on-error: true
