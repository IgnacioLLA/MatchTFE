# --------------------------------------------------------------
#  MATCH-TFE  -  CI Pipeline
#  Build -> Analyze -> Test -> Coverage
# --------------------------------------------------------------
name: CI - Build, Test & Coverage

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # --------------------------------------------
  #  1. Build & Static Analysis
  # --------------------------------------------
  build:
    name: Build & Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore MATCH-TFE.slnx

      - name: Build solution
        run: dotnet build MATCH-TFE.slnx --no-restore --configuration Release /p:TreatWarningsAsErrors=true

      - name: Static analysis (dotnet format)
        run: dotnet format MATCH-TFE.slnx --verify-no-changes --verbosity diagnostic
        continue-on-error: true

  # --------------------------------------------
  #  2. Unit Tests + Coverage
  # --------------------------------------------
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore MATCH-TFE.slnx

      - name: Run tests with coverage
        run: |
          dotnet test MATCH-TFE.slnx \
            --no-restore \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura \
               DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByFile="**/Migrations/**"

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: '**/TestResults/**/coverage.cobertura.xml'
          targetdir: ./CoverageReport
          reporttypes: 'HtmlInline_AzurePipelines;Cobertura;MarkdownSummaryGithub'
          assemblyfilters: '-*.Tests;-*.UnitTest'

      - name: Publish coverage summary
        if: always()
        run: |
          if [ -f ./CoverageReport/SummaryGithub.md ]; then
            echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat ./CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/**/*.trx
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./CoverageReport
          retention-days: 30

      - name: Publish coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage-badge.json
          label: Coverage
          message: ${{ steps.coverage.outputs.coverage }}
          valColorRange: ${{ steps.coverage.outputs.coverage }}
          minColorRange: 0
          maxColorRange: 100
        continue-on-error: true
