services:
  postgresdb:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: MatchTFEDb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  matchtfe:
    image: ${DOCKER_REGISTRY-}matchtfe
    build:
      context: .
      dockerfile: MatchTFE/MatchTFE/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_HTTP_PORTS=8080
      - GATEWAY_BASE_URL=http://${BASE_HOST}:5080/

  apigateway:
    image: nginx:alpine
    ports:
      - "5080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - authservice

  authservice:
    image: ${DOCKER_REGISTRY-}authservice
    build:
      context: .
      dockerfile: AuthService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - FRONTEND_ORIGIN=http://${BASE_HOST}:5080
      - ConnectionStrings__DbConnection=Host=postgresdb;Port=5432;Database=MatchTFEDb;Username=postgres;Password=${DB_PASSWORD}
      - USER_SERVICE_BASE_URL=http://userservice:8080/
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__RefreshSecret=${REFRESH_SECRET}
      - JwtSettings__Issuer=MatchTFE_AuthService
      - JwtSettings__Audience=MatchTFE_Clients
    depends_on:
      - postgresdb
      - userservice

  userservice:
    image: ${DOCKER_REGISTRY-}userservice
    build:
      context: .
      dockerfile: UserService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - FRONTEND_ORIGIN=http://${BASE_HOST}:5080
      - ConnectionStrings__DbConnection=Host=postgresdb;Port=5432;Database=MatchTFEDb;Username=postgres;Password=${DB_PASSWORD}
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=MatchTFE_AuthService
      - JwtSettings__Audience=MatchTFE_Clients
    depends_on:
      - postgresdb
      - matchservice

  matchservice:
    image: ${DOCKER_REGISTRY-}matchservice
    build:
      context: .
      dockerfile: MatchService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - FRONTEND_ORIGIN=http://${BASE_HOST}:5080
      - ConnectionStrings__DbConnection=Host=postgresdb;Port=5432;Database=MatchTFEDb;Username=postgres;Password=${DB_PASSWORD}
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=MatchTFE_AuthService
      - JwtSettings__Audience=MatchTFE_Clients
    depends_on:
      - postgresdb

volumes:
  postgres_data:

